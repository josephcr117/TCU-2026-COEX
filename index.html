<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #0a0e1a;
  }

  .page {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: linear-gradient(160deg, #0d1220 0%, #0a1628 45%, #0d1f35 100%);
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* Static SVG layer on top of canvas */
  .svg-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* Glow overlays */
  .glow-top {
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,200,255,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .glow-mid {
    position: absolute;
    top: 350px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(0,120,255,0.06) 0%, transparent 65%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    bottom: -80px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 350px;
    background: radial-gradient(ellipse, rgba(0,220,180,0.07) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Top accent bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #00c8ff, #0066ff, #00e5b0, transparent);
  }

  /* Bottom accent bar */
  .bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, transparent, #0066ff, #00c8ff, #00e5b0, transparent);
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 40px; height: 40px;
  }
  .corner.tl { top: 18px; left: 18px; border-top: 2px solid rgba(0,200,255,0.5); border-left: 2px solid rgba(0,200,255,0.5); }
  .corner.tr { top: 18px; right: 18px; border-top: 2px solid rgba(0,200,255,0.5); border-right: 2px solid rgba(0,200,255,0.5); }
  .corner.bl { bottom: 18px; left: 18px; border-bottom: 2px solid rgba(0,200,255,0.5); border-left: 2px solid rgba(0,200,255,0.5); }
  .corner.br { bottom: 18px; right: 18px; border-bottom: 2px solid rgba(0,200,255,0.5); border-right: 2px solid rgba(0,200,255,0.5); }
</style>
</head>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particle network
const particles = [];
for (let i = 0; i < 55; i++) {
  particles.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: Math.random() * 1.8 + 0.4,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.3,
    color: Math.random() > 0.5 ? '#00c8ff' : Math.random() > 0.5 ? '#0066ff' : '#00e5b0'
  });
}

function draw() {
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < 130) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(0, 150, 220, ${(1 - dist/130) * 0.12})`;
        ctx.lineWidth = 0.6;
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  particles.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.globalAlpha = 1;
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
  });

  requestAnimationFrame(draw);
}
draw();
</script>
